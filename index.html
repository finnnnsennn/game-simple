<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Tebak Angka</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Tebak Angka!</h1>
    <p>Saya sudah memilih angka antara 1 hingga 100. Bisakah Anda menebaknya?</p>
    <input type="number" id="guessInput" placeholder="Masukkan tebakan Anda" />
    <button id="guessButton">Tebak</button>
    <p id="feedback"></p>
    <button id="resetButton" style="display: none;">Main Lagi</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
